<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#ffffff"/>
  <ellipse cx="200" cy="368" rx="125" ry="12" fill="#e0e0e0"/>

  <!-- Board with notation border -->
  <rect x="45" y="45" width="310" height="310" rx="3" fill="#2e7d32"/>
  <!-- Inner board -->
  <rect x="65" y="65" width="270" height="270" fill="#81c784"/>

  <!-- Dark squares — green tournament style -->
  <!-- Row 1 -->
  <rect x="65"  y="65"  width="33.75" height="33.75" fill="#2e7d32"/>
  <rect x="132.5" y="65"  width="33.75" height="33.75" fill="#2e7d32"/>
  <rect x="200" y="65"  width="33.75" height="33.75" fill="#2e7d32"/>
  <rect x="267.5" y="65"  width="33.75" height="33.75" fill="#2e7d32"/>
  <!-- Row 2 -->
  <rect x="98.75" y="98.75" width="33.75" height="33.75" fill="#2e7d32"/>
  <rect x="166.25" y="98.75" width="33.75" height="33.75" fill="#2e7d32"/>
  <rect x="233.75" y="98.75" width="33.75" height="33.75" fill="#2e7d32"/>
  <rect x="301.25" y="98.75" width="33.75" height="33.75" fill="#2e7d32"/>
  <!-- Row 3 -->
  <rect x="65"  y="132.5" width="33.75" height="33.75" fill="#2e7d32"/>
  <rect x="132.5" y="132.5" width="33.75" height="33.75" fill="#2e7d32"/>
  <rect x="200" y="132.5" width="33.75" height="33.75" fill="#2e7d32"/>
  <rect x="267.5" y="132.5" width="33.75" height="33.75" fill="#2e7d32"/>
  <!-- Row 4 -->
  <rect x="98.75" y="166.25" width="33.75" height="33.75" fill="#2e7d32"/>
  <rect x="166.25" y="166.25" width="33.75" height="33.75" fill="#2e7d32"/>
  <rect x="233.75" y="166.25" width="33.75" height="33.75" fill="#2e7d32"/>
  <rect x="301.25" y="166.25" width="33.75" height="33.75" fill="#2e7d32"/>
  <!-- Row 5 -->
  <rect x="65"  y="200" width="33.75" height="33.75" fill="#2e7d32"/>
  <rect x="132.5" y="200" width="33.75" height="33.75" fill="#2e7d32"/>
  <rect x="200" y="200" width="33.75" height="33.75" fill="#2e7d32"/>
  <rect x="267.5" y="200" width="33.75" height="33.75" fill="#2e7d32"/>
  <!-- Row 6 -->
  <rect x="98.75" y="233.75" width="33.75" height="33.75" fill="#2e7d32"/>
  <rect x="166.25" y="233.75" width="33.75" height="33.75" fill="#2e7d32"/>
  <rect x="233.75" y="233.75" width="33.75" height="33.75" fill="#2e7d32"/>
  <rect x="301.25" y="233.75" width="33.75" height="33.75" fill="#2e7d32"/>
  <!-- Row 7 -->
  <rect x="65"  y="267.5" width="33.75" height="33.75" fill="#2e7d32"/>
  <rect x="132.5" y="267.5" width="33.75" height="33.75" fill="#2e7d32"/>
  <rect x="200" y="267.5" width="33.75" height="33.75" fill="#2e7d32"/>
  <rect x="267.5" y="267.5" width="33.75" height="33.75" fill="#2e7d32"/>
  <!-- Row 8 -->
  <rect x="98.75" y="301.25" width="33.75" height="33.75" fill="#2e7d32"/>
  <rect x="166.25" y="301.25" width="33.75" height="33.75" fill="#2e7d32"/>
  <rect x="233.75" y="301.25" width="33.75" height="33.75" fill="#2e7d32"/>
  <rect x="301.25" y="301.25" width="33.75" height="33.75" fill="#2e7d32"/>

  <!-- Algebraic notation — files (a-h) -->
  <text x="82"  y="360" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">a</text>
  <text x="116" y="360" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">b</text>
  <text x="150" y="360" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">c</text>
  <text x="184" y="360" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">d</text>
  <text x="218" y="360" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">e</text>
  <text x="252" y="360" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">f</text>
  <text x="286" y="360" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">g</text>
  <text x="320" y="360" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">h</text>
  <!-- Ranks (1-8) -->
  <text x="56" y="320" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">1</text>
  <text x="56" y="286" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">2</text>
  <text x="56" y="252" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">3</text>
  <text x="56" y="218" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">4</text>
  <text x="56" y="184" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">5</text>
  <text x="56" y="150" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">6</text>
  <text x="56" y="116" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">7</text>
  <text x="56" y="82"  text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">8</text>

  <!-- A few pieces mid-game position -->
  <circle cx="200" cy="183" r="13" fill="#1a1a1a"/>
  <circle cx="166" cy="217" r="11" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
  <circle cx="234" cy="149" r="11" fill="#1a1a1a"/>
  <circle cx="268" cy="183" r="13" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>

  <!-- FIDE badge -->
  <rect x="155" y="48" width="90" height="14" rx="7" fill="#1565c0"/>
  <text x="200" y="59" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#fff" font-weight="bold">FIDE STANDARD</text>

  <text x="200" y="390" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="14" fill="#888" font-weight="500">Tournament Chess Board</text>
</svg>
