<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#ffffff"/>
  <!-- Shadow -->
  <ellipse cx="200" cy="340" rx="90" ry="14" fill="#e0e0e0"/>
  <!-- Cube body isometric: front face -->
  <polygon points="200,60 340,140 340,280 200,360 60,280 60,140" fill="#1a1a1a"/>
  <!-- Front face (bottom-left panel) -->
  <polygon points="200,210 200,360 60,280 60,140" fill="#1a1a1a"/>
  <!-- Top face -->
  <polygon points="200,60 340,140 200,210 60,140" fill="#2a2a2a"/>
  <!-- Right face -->
  <polygon points="340,140 340,280 200,360 200,210" fill="#111111"/>

  <!-- Front face stickers (2x2 grid) — Red & Orange -->
  <!-- Top-left sticker -->
  <polygon points="80,148 130,120 130,195 80,220" fill="#e53935" rx="4"/>
  <polygon points="82,150 128,123 128,192 82,217" fill="#ef5350"/>
  <!-- Bottom-left sticker -->
  <polygon points="80,228 130,202 130,275 80,300" fill="#e53935"/>
  <polygon points="82,230 128,205 128,272 82,297" fill="#ef5350"/>
  <!-- Top-right sticker -->
  <polygon points="138,118 188,148 188,220 138,193" fill="#ff6f00"/>
  <polygon points="140,120 186,149 186,218 140,191" fill="#ffa726"/>
  <!-- Bottom-right sticker -->
  <polygon points="138,200 188,228 188,298 138,272" fill="#ff6f00"/>
  <polygon points="140,202 186,230 186,296 140,270" fill="#ffa726"/>

  <!-- Top face stickers (2x2) — White & Yellow -->
  <polygon points="80,132 130,105 200,148 150,175" fill="#ffffff" stroke="#ccc" stroke-width="1"/>
  <polygon points="150,105 200,78 270,120 220,148" fill="#ffee58"/>
  <polygon points="80,132 130,105 200,148 150,175" fill="#f5f5f5"/>
  <polygon points="150,105 200,78 270,120 220,148" fill="#fff176"/>

  <!-- Right face stickers (2x2) — Green & Blue -->
  <polygon points="210,148 270,120 270,195 210,220" fill="#43a047"/>
  <polygon points="212,150 268,123 268,192 212,217" fill="#66bb6a"/>
  <polygon points="210,228 270,202 270,272 210,298" fill="#1e88e5"/>
  <polygon points="212,230 268,205 268,270 212,296" fill="#42a5f5"/>

  <!-- Grid lines front -->
  <line x1="130" y1="120" x2="130" y2="275" stroke="#111" stroke-width="3"/>
  <line x1="80" y1="184" x2="188" y2="184" stroke="#111" stroke-width="3"/>
  <!-- Grid lines top -->
  <line x1="130" y1="105" x2="200" y2="148" stroke="#111" stroke-width="3"/>
  <line x1="80" y1="132" x2="270" y2="120" stroke="#111" stroke-width="3"/>
  <!-- Grid lines right -->
  <line x1="270" y1="120" x2="270" y2="272" stroke="#111" stroke-width="3"/>
  <line x1="210" y1="184" x2="270" y2="157" stroke="#111" stroke-width="3"/>

  <text x="200" y="385" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="15" fill="#888" font-weight="500">2×2 Rubik's Cube</text>
</svg>
