  <polygon points="120,151 155,132 190,151 155,170" fill="#fff9c4"/><polygon points="122,152 153,134 188,152 153,169" fill="#fff176"/>
  <polygon points="160,130 195,111 230,130 195,149" fill="#fff9c4"/><polygon points="162,131 193,113 228,131 193,148" fill="#fff176"/>

