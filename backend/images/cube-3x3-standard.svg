  <polygon points="80,132 115,113 150,132 115,151" fill="#fff9c4"/><polygon points="82,133 113,115 148,133 113,149" fill="#fff176"/>
  <polygon points="120,111 155,92 190,111 155,130" fill="#fff9c4"/><polygon points="122,112 153,94 188,112 153,129" fill="#fff176"/>
  <polygon points="160,90 195,71 230,90 195,109" fill="#fff9c4"/><polygon points="162,91 193,73 228,91 193,108" fill="#fff176"/>
  <!-- Row 2 -->
  <polygon points="80,152 115,133 150,152 115,171" fill="#ffffff"/><polygon points="82,153 113,135 148,153 113,169" fill="#f5f5f5"/>
