  <polygon points="205,130 245,150 245,195 205,175" fill="#43a047"/><polygon points="207,132 243,152 243,192 207,172" fill="#66bb6a"/>
  <polygon points="250,152 290,172 290,217 250,197" fill="#1e88e5"/><polygon points="252,154 288,174 288,214 252,194" fill="#42a5f5"/>
  <polygon points="295,174 335,194 335,239 295,219" fill="#43a047"/><polygon points="297,176 333,196 333,236 297,216" fill="#66bb6a"/>
  <polygon points="205,182 245,202 245,247 205,227" fill="#1e88e5"/><polygon points="207,184 243,204 243,244 207,224" fill="#42a5f5"/>
  <polygon points="250,204 290,224 290,269 250,249" fill="#43a047"/><polygon points="252,206 288,226 288,266 252,246" fill="#66bb6a"/>
