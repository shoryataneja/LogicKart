  <polygon points="205,78 245,98 245,143 205,122" fill="#1e88e5"/><polygon points="207,80 243,100 243,140 207,120" fill="#42a5f5"/>
  <polygon points="250,100 290,120 290,165 250,145" fill="#43a047"/><polygon points="252,102 288,122 288,162 252,142" fill="#66bb6a"/>
