  <line x1="150" y1="132" x2="230" y2="90" stroke="#111" stroke-width="2.5"/>
  <line x1="80" y1="152" x2="230" y2="90" stroke="#111" stroke-width="2.5"/>
  <!-- Grid lines — right face -->
  <line x1="245" y1="98" x2="245" y2="247" stroke="#111" stroke-width="2.5"/>
  <line x1="290" y1="120" x2="290" y2="269" stroke="#111" stroke-width="2.5"/>
  <line x1="205" y1="175" x2="335" y2="194" stroke="#111" stroke-width="2.5"/>
  <line x1="205" y1="227" x2="335" y2="246" stroke="#111" stroke-width="2.5"/>

  <text x="200" y="385" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="15" fill="#888" font-weight="500">3×3 Rubik's Cube</text>
</svg>
