  <rect x="88" y="38" width="230" height="316" rx="4" fill="#bf360c"/>
  <!-- Top accent bar -->
  <rect x="88" y="38" width="230" height="8" rx="2" fill="#ffcc02"/>
  <!-- Bottom accent bar -->
  <rect x="88" y="346" width="230" height="8" rx="2" fill="#ffcc02"/>
