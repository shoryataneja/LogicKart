  <!-- Book shadow -->
  <rect x="82" y="42" width="240" height="316" rx="4" fill="#00000022"/>
  <!-- Book back -->
  <rect x="78" y="38" width="240" height="316" rx="4" fill="#870000"/>
  <!-- Spine -->
  <rect x="78" y="38" width="22" height="316" rx="4" fill="#bf360c" opacity="0.7"/>
